name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Optional: services for database, redis, etc.
    # services:
    #   postgres:
    #     image: postgres:14
    #     env:
    #       POSTGRES_DB: mediflow
    #       POSTGRES_USER: admin
    #       POSTGRES_PASSWORD: password
    #     ports:
    #       - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json

    # Frontend setup
    - name: Install Frontend Dependencies
      working-directory: apps/frontend
      run: npm ci

    - name: Install Playwright Browsers
      working-directory: apps/frontend
      run: npx playwright install --with-deps

    # Python / Django backend setup (adjust based on project needs)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Backend Dependencies
      working-directory: apps/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Setup database (modify for actual DB needs)
    - name: Migrate Database
      working-directory: apps/backend
      run: python manage.py migrate

    # Start Backend
    - name: Start Django Backend
      working-directory: apps/backend
      run: python manage.py runserver 8000 &
      
    # Start Frontend
    - name: Start Next.js Frontend
      working-directory: apps/frontend
      run: npm run dev &
      
    - name: Wait for services
      run: |
        npx wait-on http://localhost:8000/api/v1/health/ || sleep 10
        npx wait-on http://localhost:3000/ || sleep 10

    - name: Run Backend Smoke Tests
      working-directory: apps/backend
      run: python manage.py test --tag=smoke

    - name: Run Backend Regression Tests
      working-directory: apps/backend
      run: python manage.py test --tag=regression
      continue-on-error: false # Block on regression failure

    - name: Run Frontend Smoke Tests
      working-directory: apps/frontend
      run: npm test -- -t "@smoke"
      continue-on-error: true # Keep fast smoke isolated

    - name: Run Frontend Regression Tests
      working-directory: apps/frontend
      run: npm test -- -t "@regression|@integration"
      continue-on-error: false # Block on regression failure

    - name: Run Playwright tests
      working-directory: apps/frontend
      run: npx playwright test
      env:
        CI: true
        BASE_URL: http://localhost:3000

    - uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: apps/frontend/playwright-report/
        retention-days: 30
